<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Abdennour Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Segoe UI;
  background:linear-gradient(120deg,#020617,#0f172a,#020617);
  background-size:200% 200%;
  animation:bg 10s infinite alternate;
  color:white;
}
@keyframes bg{
  0%{background-position:left;}
  100%{background-position:right;}
}

.nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(12px);
}
.nav a{
  color:white;
  text-decoration:none;
  opacity:0.7;
  transition:0.3s;
}
.nav a:hover{
  opacity:1;
  color:#3b82f6;
  transform:scale(1.1);
}

.container{
  padding-top:150px;
  max-width:1000px;
  margin:auto;
  text-align:center;
}

.avatar{
  width:150px;
  height:150px;
  border-radius:50%;
  border:3px solid #3b82f6;
  object-fit:cover;
  transition:0.4s;
}
.avatar:hover{transform:scale(1.1);}

h1{
  font-size:60px;
  margin:20px 0;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:30px;
  border-radius:15px;
  margin:20px;
  transition:0.4s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px rgba(59,130,246,0.3);
}

.btn{
  display:inline-block;
  padding:12px 25px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa);
  border-radius:8px;
  text-decoration:none;
  color:white;
}
</style>

</head>

<body>

<div class="nav">

<a href="experiences.html">Expériences</a>
<a href="formations.html">Formations</a>
<a href="projets.html">Projets</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<img src="photo.jpg" class="avatar">

<h1>Siaci Abdennour</h1>
<p>Développeur Web • Java • SQL • React</p>

<div class="card">
Je construis des projets concrets pour évoluer dans le développement informatique.
</div>

<h2>CV</h2>

</div>

<div class="card">
<h2>Passions</h2>
<p>Voyage 🌍</p>
<p>Fitness 💪</p>
<p>Tech 💻</p>
</div>

</div>

</body>
</html>
